<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>fac</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header>
        <div class="header-top">
            <div>
                <h1>fac</h1>
                <p>Familia, amigos y conocidos</p>
            </div>
            <div class="toolbar">
                <a href="/exportar" class="btn-toolbar">↓ Exportar .xlsx</a>
                <label class="btn-toolbar">
                    ↑ Importar .xlsx
                    <input type="file" id="input-importar" accept=".xlsx" style="display:none">
                </label>
                <button class="btn-toolbar btn-peligro" onclick="vaciarDB()">⚠ Vaciar BD</button>
                <span id="msg-importar"></span>
            </div>
        </div>
    </header>

    <div id="arbol-container" class="arbol-container hidden">
        <div class="arbol-header">
            <h2 id="arbol-titulo"></h2>
            <button onclick="cerrarArbol()">✕ Cerrar</button>
        </div>
        <div id="arbol-contenido" class="arbol-grid"></div>
    </div>

    <main>
        <section>
            <h2>Personas</h2>
            <form id="form-persona">
                <input type="text" name="nombre" placeholder="Nombre" required>
                <input type="text" name="primer_apellido" placeholder="Primer apellido" required>
                <input type="text" name="segundo_apellido" placeholder="Segundo apellido">
                <input type="text" name="apodo" placeholder="Apodo">
                <label>Fecha nacimiento <input type="date" name="fecha_nacimiento"></label>
                <label>Fecha defunción <input type="date" name="fecha_defuncion"></label>
                <select name="genero">
                    <option value="">Género</option>
                    <option value="masculino">Masculino</option>
                    <option value="femenino">Femenino</option>
                    <option value="otro">Otro</option>
                </select>
                <textarea name="notas" placeholder="Notas"></textarea>
                <button type="submit">Añadir persona</button>
            </form>
            <ul id="lista-personas"></ul>
        </section>

        <section>
            <h2>Relaciones</h2>
            <form id="form-relacion">
                <select name="persona_a_id" required>
                    <option value="">Persona A</option>
                </select>
                <select name="tipo" required>
                    <option value="">Tipo</option>
                    <option value="progenitor">Progenitor</option>
                    <option value="pareja">Pareja</option>
                    <option value="amigo">Amigo</option>
                    <option value="conocido">Conocido</option>
                </select>
                <select name="persona_b_id" required>
                    <option value="">Persona B</option>
                </select>
                <input type="text" name="comentario" placeholder="Comentario (opcional)">
                <button type="submit">Añadir relación</button>
            </form>
            <ul id="lista-relaciones"></ul>
        </section>
    </main>

    <script src="/static/app.js"></script>
</body>
</html>
