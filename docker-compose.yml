services:
  fac:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data
      - ./app:/app/app
    environment:
      - DATABASE_URL=sqlite:////data/fac.db
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_MODEL=llama3.2
    depends_on:
      - ollama

  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  ollama_data:
